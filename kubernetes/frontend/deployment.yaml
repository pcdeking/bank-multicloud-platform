apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bank-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 542855644267.dkr.ecr.us-east-1.amazonaws.com/dev-frontend:v4

        ports:
        - containerPort: 80

        env:
        - name: VITE_API_URL
          value: "http://backend-service:5000"